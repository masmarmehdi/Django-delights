{% extends 'base.html' %}
{% block head %}
    <title>Delete Ingredient — Django Delights</title>
{% endblock %}

{% block content %}
<div class="container">
    <div class="delete-card">
        <i class="bi bi-trash-fill"></i>
        <h4 class="font-weight-bold mb-2">Delete Ingredient</h4>
        <p class="text-muted mb-4">
            Are you sure you want to delete <strong>{{ object }}</strong>?
            This action cannot be undone.
        </p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger btn-lg px-5">
                    <i class="bi bi-trash-fill mr-1"></i>Delete
                </button>
                <a href="{% url 'ingredients' %}" class="btn btn-outline-secondary btn-lg px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
