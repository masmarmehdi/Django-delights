{% extends 'base.html' %}
{% block head %}
    <title>Logged Out — Django Delights</title>
{% endblock %}

{% block content %}
<div class="container">
    <div class="delete-card" style="border-top: 4px solid #495464;">
        <i class="bi bi-door-open-fill" style="color:#495464;"></i>
        <h4 class="font-weight-bold mb-2">You've been logged out</h4>
        <p class="text-muted mb-4">Hope to see you again soon!</p>
        <div class="form-actions">
            <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-box-arrow-in-right mr-1"></i>Login Again
            </a>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-lg px-4">Go Home</a>
        </div>
    </div>
</div>
{% endblock %}
